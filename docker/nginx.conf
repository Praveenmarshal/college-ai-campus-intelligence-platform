# docker/nginx.conf
# Top-level reverse proxy — terminates TLS and routes to frontend/backend containers.
# For local dev, use docker/nginx-spa.conf (HTTP only) bundled into the frontend image instead.

upstream backend_upstream {
    server backend:5000;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS in production (uncomment when certs are configured)
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

